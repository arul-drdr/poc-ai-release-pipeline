name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    name: AI Code Review
    if: "!startsWith(github.event.pull_request.title, 'chore(main): release')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get PR diff and run AI review
        id: review
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$NVIDIA_API_KEY" ]; then
            echo "Warning: NVIDIA_API_KEY not configured, skipping AI review"
            exit 0
          fi

          # Get the PR diff and save to file
          gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > pr-diff.txt 2>/dev/null || true

          if [ ! -s pr-diff.txt ]; then
            echo "No diff found, skipping review"
            exit 0
          fi

          echo "Diff size: $(wc -c < pr-diff.txt) bytes"

          # Run AI review — stdout = review markdown, stderr = status logs
          node scripts/ai-review-pr.js < pr-diff.txt > ai-review-output.md || true

          echo "Review output size: $(wc -c < ai-review-output.md) bytes"

      - name: AI Generate Release Notes
        id: ai_notes
        continue-on-error: true
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$NVIDIA_API_KEY" ]; then
            echo "NVIDIA_API_KEY not set, skipping AI release notes"
            exit 0
          fi

          if [ ! -s pr-diff.txt ]; then
            echo "No diff file, skipping AI release notes"
            exit 0
          fi

          # Only generate if the PR body still has the placeholder
          if ! echo "$PR_BODY" | grep -q 'Write a customer-readable description of this change'; then
            echo "Release notes already filled in, skipping"
            exit 0
          fi

          # Generate release notes from diff
          NOTES=$(node scripts/ai-release-notes-from-diff.js < pr-diff.txt 2>/dev/null || echo "")

          if [ -n "$NOTES" ] && [ "$NOTES" != "No release notes available." ]; then
            echo "$NOTES" > ai-release-notes.txt
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
            echo "AI release notes generated successfully"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
            echo "AI could not generate release notes"
          fi

      - name: Update PR body with AI release notes
        if: steps.ai_notes.outputs.has_notes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const notes = fs.readFileSync('ai-release-notes.txt', 'utf8').trim();
            const prNumber = context.payload.pull_request.number;

            // Get current PR body (may have been updated by Jira auto-fill)
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            let body = pr.body || '';

            // Only replace if placeholder is still present
            if (body.includes('Write a customer-readable description of this change')) {
              body = body.replace(
                'Write a customer-readable description of this change',
                notes + '\n\n_Generated by AI from code diff_'
              );

              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                body: body
              });

              console.log(`Updated PR #${prNumber} with AI-generated release notes`);
            } else {
              console.log('Release notes already filled, skipping update');
            }

      - name: Post review comment
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f ai-review-output.md ]; then
            echo "No review output found, skipping comment"
            exit 0
          fi

          PR_NUMBER=${{ github.event.pull_request.number }}

          # Check if an AI review comment already exists, update instead of creating duplicates
          EXISTING_COMMENT_ID=$(gh api \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("🤖 AI Code Review")) | .id' | head -1)

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID}" \
              -f body="$(cat ai-review-output.md)"
            echo "Updated existing AI review comment"
          else
            gh pr comment "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --body-file ai-review-output.md
            echo "Posted new AI review comment"
          fi
