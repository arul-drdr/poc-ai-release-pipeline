name: PR Merged - Notify

on:
  pull_request:
    types: [closed]

jobs:
  notify:
    name: Generate & Distribute Release Notes
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract PR metadata
        id: metadata
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          IS_RELEASE="false"

          # Detect release-please PRs
          if echo "$PR_TITLE" | grep -q '^chore(main): release'; then
            IS_RELEASE="true"

            # Extract version from title: "chore(main): release poc-ai-release-pipeline 1.4.0" -> "1.4.0"
            RELEASE_VERSION=$(echo "$PR_TITLE" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | tail -1)
            DESCRIPTION="Release ${RELEASE_VERSION}"
            SCOPE="release"

            # Determine work type from changelog sections
            HAS_FEATURES=$(echo "$PR_BODY" | grep -c '### New Features' || true)
            HAS_BUGFIXES=$(echo "$PR_BODY" | grep -c '### Bug Fixes' || true)
            if [ "$HAS_FEATURES" -gt 0 ]; then
              WORK_TYPE="Feature"
            elif [ "$HAS_BUGFIXES" -gt 0 ]; then
              WORK_TYPE="Bug Fix"
            else
              WORK_TYPE="Change Request"
            fi

            # Extract all Jira IDs from changelog body
            JIRA_IDS=$(echo "$PR_BODY" | grep -oE '[A-Z]+-[0-9]+' | sort -u | paste -sd ',' -)
            JIRA_ID="${JIRA_IDS:-N/A}"

            # Extract changelog entries as release notes (strip markdown links, commit hashes, empty parens)
            RELEASE_NOTES=$(echo "$PR_BODY" | sed -n '/^### /,/^---/{/^### /d;/^---/d;p;}' | sed 's/\[#[0-9]*\]([^)]*)//g' | sed 's/\[[a-f0-9]*\]([^)]*)//g' | sed 's/()//g' | sed 's/  */ /g' | sed 's/^ *//;/^$/d' | head -20)

            if [ -z "$RELEASE_NOTES" ]; then
              RELEASE_NOTES="No release notes provided."
            fi

            # Check for breaking change markers
            BREAKING="false"
            if echo "$PR_BODY" | grep -qiE '(BREAKING CHANGE|breaking change|### ⚠)'; then
              BREAKING="true"
            fi
          else
            # Regular PR: extract from PR template fields
            WORK_TYPE="Other"
            if echo "$PR_BODY" | grep -q '\- \[x\] Bug'; then
              WORK_TYPE="Bug Fix"
            elif echo "$PR_BODY" | grep -q '\- \[x\] Feature'; then
              WORK_TYPE="Feature"
            elif echo "$PR_BODY" | grep -q '\- \[x\] Change Request'; then
              WORK_TYPE="Change Request"
            elif echo "$PR_BODY" | grep -q '\- \[x\] Critical Fix'; then
              WORK_TYPE="Critical Fix"
            fi

            # Extract Jira ID from title
            JIRA_ID=$(echo "$PR_TITLE" | grep -oE '[A-Z]+-[0-9]+' | head -1)
            JIRA_ID="${JIRA_ID:-N/A}"

            # Extract Release Notes section from PR body
            RELEASE_NOTES=$(echo "$PR_BODY" | sed -n '/## Release Notes/,/## /{ /## Release Notes/d; /## /d; p; }' | sed '/^$/d' | head -20)

            if [ -z "$RELEASE_NOTES" ] || echo "$RELEASE_NOTES" | grep -q 'Write a customer-readable description'; then
              RELEASE_NOTES="No release notes provided."
            fi

            # Extract scope from PR title: type(scope): description -> scope
            SCOPE=$(echo "$PR_TITLE" | grep -oP '(?<=\().*?(?=\))' | head -1)
            SCOPE="${SCOPE:-general}"

            # Clean description (remove type prefix and Jira ID)
            DESCRIPTION=$(echo "$PR_TITLE" | sed 's/^[a-z]*([^)]*): //' | sed 's/^[A-Z]*-[0-9]* //')

            # Check for breaking change markers
            BREAKING="false"
            if echo "$PR_BODY" | grep -qiE '(BREAKING CHANGE|breaking change|\!\()'; then
              BREAKING="true"
            fi
          fi

          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
          echo "work_type=$WORK_TYPE" >> "$GITHUB_OUTPUT"
          echo "jira_id=$JIRA_ID" >> "$GITHUB_OUTPUT"
          echo "scope=${SCOPE:-general}" >> "$GITHUB_OUTPUT"
          echo "description=$DESCRIPTION" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "breaking=$BREAKING" >> "$GITHUB_OUTPUT"

          echo "release_notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RELEASE_NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Extract version
        id: version
        run: |
          VERSION=$(jq -r '.["."]' .release-please-manifest.json 2>/dev/null || echo "")
          echo "version=${VERSION:-N/A}" >> "$GITHUB_OUTPUT"
          echo "Current version: ${VERSION:-N/A}"

      - name: Rewrite release notes with AI
        id: rewrite
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          RELEASE_NOTES: ${{ steps.metadata.outputs.release_notes }}
        run: |
          echo "$RELEASE_NOTES" | node scripts/rewrite-release-notes.js

          if [ -f customer-release-notes.md ]; then
            echo "customer_notes<<EOF" >> "$GITHUB_OUTPUT"
            cat customer-release-notes.md >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "customer_notes<<EOF" >> "$GITHUB_OUTPUT"
            echo "$RELEASE_NOTES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Post to Slack
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORK_TYPE: ${{ steps.metadata.outputs.work_type }}
          SCOPE: ${{ steps.metadata.outputs.scope }}
          DESCRIPTION: ${{ steps.metadata.outputs.description }}
          JIRA_ID: ${{ steps.metadata.outputs.jira_id }}
          PR_URL: ${{ steps.metadata.outputs.pr_url }}
          PR_NUMBER: ${{ steps.metadata.outputs.pr_number }}
          CUSTOMER_NOTES: ${{ steps.rewrite.outputs.customer_notes }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "Warning: SLACK_WEBHOOK_URL not configured, skipping Slack notification"
            exit 0
          fi

          # Truncate notes for Slack
          TRUNCATED_NOTES=$(echo "$CUSTOMER_NOTES" | head -c 2500)

          PAYLOAD=$(cat <<EOFPAYLOAD
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "Deployed: ${DESCRIPTION}"
                }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Type:* ${WORK_TYPE}" },
                  { "type": "mrkdwn", "text": "*Scope:* ${SCOPE}" },
                  { "type": "mrkdwn", "text": "*Jira:* ${JIRA_ID}" },
                  { "type": "mrkdwn", "text": "*PR:* <${PR_URL}|#${PR_NUMBER}>" }
                ]
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Release Notes:*\n${TRUNCATED_NOTES}"
                }
              }
            ]
          }
          EOFPAYLOAD
          )

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"

          echo "Slack notification sent for PR #${PR_NUMBER}"

      - name: Create Notion page
        continue-on-error: true
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          WORK_TYPE: ${{ steps.metadata.outputs.work_type }}
          JIRA_ID: ${{ steps.metadata.outputs.jira_id }}
          DESCRIPTION: ${{ steps.metadata.outputs.description }}
          PR_URL: ${{ steps.metadata.outputs.pr_url }}
          MERGED_AT: ${{ github.event.pull_request.merged_at }}
          CUSTOMER_NOTES: ${{ steps.rewrite.outputs.customer_notes }}
          VERSION: ${{ steps.version.outputs.version }}
          BREAKING: ${{ steps.metadata.outputs.breaking }}
        run: |
          if [ -z "$NOTION_API_KEY" ] || [ -z "$NOTION_DATABASE_ID" ]; then
            echo "Warning: Notion secrets not configured, skipping Notion update"
            exit 0
          fi

          # Truncate notes to 1900 chars (Notion block limit is 2000)
          TRUNCATED_NOTES=$(echo "$CUSTOMER_NOTES" | head -c 1900)

          # Build Features multi-select and Bug Fixes text based on work type
          FEATURES_JSON="[]"
          BUGFIXES_TEXT=""
          IS_RELEASE="${{ steps.metadata.outputs.is_release }}"

          if [ "$IS_RELEASE" = "true" ]; then
            # For release PRs: extract features and bug fixes from changelog
            FEATURES_TEXT=$(echo "$CUSTOMER_NOTES" | grep -i 'feature\|new\|add\|enhancement' | head -3 | tr '\n' '; ' || true)
            BUGFIXES_TEXT=$(echo "$CUSTOMER_NOTES" | grep -i 'fix\|bug\|patch\|resolve' | head -3 | tr '\n' '; ' || true)
            if [ -n "$FEATURES_TEXT" ]; then
              FEATURES_JSON='[{"name": "New Feature"}]'
            fi
            NOTION_TITLE="${DESCRIPTION}"
          else
            case "$WORK_TYPE" in
              "Feature")
                FEATURES_JSON='[{"name": "New Feature"}]'
                ;;
              "Change Request")
                FEATURES_JSON='[{"name": "Enhancement"}]'
                ;;
              "Bug Fix")
                BUGFIXES_TEXT="${DESCRIPTION}"
                ;;
              "Critical Fix")
                BUGFIXES_TEXT="${DESCRIPTION}"
                ;;
            esac
            NOTION_TITLE="${JIRA_ID} - ${DESCRIPTION}"
          fi

          PAYLOAD=$(cat <<EOFPAYLOAD
          {
            "parent": { "database_id": "${NOTION_DATABASE_ID}" },
            "properties": {
              "Title": {
                "title": [{ "text": { "content": "${NOTION_TITLE}" } }]
              },
              "Version": {
                "rich_text": [{ "type": "text", "text": { "content": "${VERSION}" } }]
              },
              "Release Date": {
                "date": { "start": "$(echo "$MERGED_AT" | cut -dT -f1)" }
              },
              "Type": {
                "select": { "name": "${WORK_TYPE}" }
              },
              "Status": {
                "status": { "name": "Released" }
              },
              "Summary": {
                "rich_text": [{ "type": "text", "text": { "content": "${TRUNCATED_NOTES}" } }]
              },
              "Features": {
                "multi_select": ${FEATURES_JSON}
              },
              "Bug Fixes": {
                "rich_text": [{ "type": "text", "text": { "content": "${BUGFIXES_TEXT}" } }]
              }
            },
            "children": [
              {
                "object": "block",
                "type": "heading_2",
                "heading_2": {
                  "rich_text": [{ "type": "text", "text": { "content": "Release Notes" } }]
                }
              },
              {
                "object": "block",
                "type": "paragraph",
                "paragraph": {
                  "rich_text": [{ "type": "text", "text": { "content": "${TRUNCATED_NOTES}" } }]
                }
              },
              {
                "object": "block",
                "type": "heading_3",
                "heading_3": {
                  "rich_text": [{ "type": "text", "text": { "content": "Links" } }]
                }
              },
              {
                "object": "block",
                "type": "paragraph",
                "paragraph": {
                  "rich_text": [
                    { "type": "text", "text": { "content": "Pull Request: " } },
                    { "type": "text", "text": { "content": "${PR_URL}", "link": { "url": "${PR_URL}" } } }
                  ]
                }
              }
            ]
          }
          EOFPAYLOAD
          )

          # Retry logic for Notion API rate limits
          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "https://api.notion.com/v1/pages" \
              -H "Authorization: Bearer ${NOTION_API_KEY}" \
              -H "Content-Type: application/json" \
              -H "Notion-Version: 2022-06-28" \
              -d "$PAYLOAD")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)

            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "Notion page created successfully for: ${DESCRIPTION}"
              break
            elif [ "$HTTP_CODE" -eq 429 ]; then
              RETRY_COUNT=$((RETRY_COUNT + 1))
              WAIT_TIME=$((RETRY_COUNT * 2))
              echo "Rate limited. Retrying in ${WAIT_TIME}s (attempt ${RETRY_COUNT}/${MAX_RETRIES})..."
              sleep $WAIT_TIME
            else
              echo "Notion API error (HTTP ${HTTP_CODE})"
              echo "$RESPONSE" | sed '$d'
              break
            fi
          done
