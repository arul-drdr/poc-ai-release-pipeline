name: PR Merged - Notify

on:
  pull_request:
    types: [closed]

jobs:
  notify:
    name: Generate & Distribute Release Notes
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract PR metadata (shell fallback)
        id: metadata
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ github.token }}
        run: |
          IS_RELEASE="false"

          # Detect release-please PRs
          if echo "$PR_TITLE" | grep -q '^chore(main): release'; then
            IS_RELEASE="true"

            RELEASE_VERSION=$(echo "$PR_TITLE" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | tail -1)
            DESCRIPTION="Release ${RELEASE_VERSION}"
            SCOPE="release"

            HAS_FEATURES=$(echo "$PR_BODY" | grep -c '### New Features' || true)
            HAS_BUGFIXES=$(echo "$PR_BODY" | grep -c '### Bug Fixes' || true)
            if [ "$HAS_FEATURES" -gt 0 ]; then
              WORK_TYPE="Feature"
            elif [ "$HAS_BUGFIXES" -gt 0 ]; then
              WORK_TYPE="Bug Fix"
            else
              WORK_TYPE="Change Request"
            fi

            JIRA_IDS=$(echo "$PR_BODY" | grep -oE '[A-Z]+-[0-9]+' | sort -u | paste -sd ',' -)
            JIRA_ID="${JIRA_IDS:-N/A}"

            RELEASE_NOTES=$(echo "$PR_BODY" | sed -n '/^### /,/^---/{/^### /d;/^---/d;p;}' | sed 's/\[#[0-9]*\]([^)]*)//g' | sed 's/\[[a-f0-9]*\]([^)]*)//g' | sed 's/()//g' | sed 's/  */ /g' | sed 's/^ *//;/^$/d' | sed 's/^\* \*\*[^*]*\*\*: /- /' | sed 's/[A-Z]\{2,\}-[0-9]\+ //g' | head -20)
            if [ -z "$RELEASE_NOTES" ]; then
              RELEASE_NOTES="No release notes provided."
            fi

            BREAKING="false"
            if echo "$PR_BODY" | grep -qiE '(BREAKING CHANGE|breaking change|### ⚠)'; then
              BREAKING="true"
            fi
          else
            # Shell-based fallback for regular PRs (AI will override below)
            WORK_TYPE="Other"
            if echo "$PR_BODY" | grep -q '\- \[x\] Bug'; then WORK_TYPE="Bug Fix";
            elif echo "$PR_BODY" | grep -q '\- \[x\] Feature'; then WORK_TYPE="Feature";
            elif echo "$PR_BODY" | grep -q '\- \[x\] Change Request'; then WORK_TYPE="Change Request";
            elif echo "$PR_BODY" | grep -q '\- \[x\] Critical Fix'; then WORK_TYPE="Critical Fix";
            fi

            # Extract all Jira IDs from title + commit messages
            TITLE_IDS=$(echo "$PR_TITLE" | grep -oE '[A-Z]+-[0-9]+' || true)
            COMMIT_IDS=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" \
              --json commits --jq '.commits[].messageHeadline' 2>/dev/null \
              | grep -oE '[A-Z]+-[0-9]+' || true)
            ALL_IDS=$(echo -e "${TITLE_IDS}\n${COMMIT_IDS}" | sed '/^$/d' | sort -u | paste -sd ',' -)
            JIRA_ID="${ALL_IDS:-N/A}"

            RELEASE_NOTES=$(echo "$PR_BODY" | sed -n '/## Release Notes/,/## /{ /## Release Notes/d; /## /d; p; }' | sed '/^$/d' | head -20)
            if [ -z "$RELEASE_NOTES" ] || echo "$RELEASE_NOTES" | grep -q 'Write a customer-readable description'; then
              RELEASE_NOTES="No release notes provided."
            fi

            SCOPE=$(echo "$PR_TITLE" | grep -oP '(?<=\().*?(?=\))' | head -1)
            SCOPE="${SCOPE:-general}"

            DESCRIPTION=$(echo "$PR_TITLE" | sed 's/^[a-z]*([^)]*): //' | sed 's/^[A-Z]*-[0-9]* //')

            BREAKING="false"
            if echo "$PR_BODY" | grep -qiE '(BREAKING CHANGE|breaking change|\!\()'; then
              BREAKING="true"
            fi
          fi

          # Extract Contributors and PR Created By from PR body
          CONTRIBUTORS=$(echo "$PR_BODY" | sed -n '/## Contributors/,/## /{ /## Contributors/d; /## /d; /^<!--/d; /^$/d; p; }' | head -1)
          if [ -z "$CONTRIBUTORS" ] || echo "$CONTRIBUTORS" | grep -q 'Auto-detected from commits'; then
            CONTRIBUTORS=""
          fi

          PR_CREATED_BY=$(echo "$PR_BODY" | sed -n '/## PR Created By/,/## /{ /## PR Created By/d; /## /d; /^<!--/d; /^$/d; p; }' | head -1)
          if [ -z "$PR_CREATED_BY" ] || echo "$PR_CREATED_BY" | grep -q 'Auto-detected from PR'; then
            PR_CREATED_BY=""
          fi

          echo "is_release=$IS_RELEASE" >> "$GITHUB_OUTPUT"
          echo "work_type=$WORK_TYPE" >> "$GITHUB_OUTPUT"
          echo "jira_id=$JIRA_ID" >> "$GITHUB_OUTPUT"
          echo "scope=${SCOPE:-general}" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "breaking=$BREAKING" >> "$GITHUB_OUTPUT"
          echo "contributors=${CONTRIBUTORS}" >> "$GITHUB_OUTPUT"
          echo "pr_created_by=${PR_CREATED_BY:-${{ github.event.pull_request.user.login }}}" >> "$GITHUB_OUTPUT"

          DELIM="META_DESC_$(date +%s%N)"
          echo "description<<${DELIM}" >> "$GITHUB_OUTPUT"
          echo "$DESCRIPTION" >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

          DELIM="META_NOTES_$(date +%s%N)"
          echo "release_notes<<${DELIM}" >> "$GITHUB_OUTPUT"
          echo "$RELEASE_NOTES" >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

      - name: AI Categorize PR
        id: ai_categorize
        if: steps.metadata.outputs.is_release != 'true'
        continue-on-error: true
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$NVIDIA_API_KEY" ]; then
            echo "NVIDIA_API_KEY not set, skipping AI categorization"
            echo "ai_result=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} 2>/dev/null || echo "")

          if [ -z "$DIFF" ]; then
            echo "No diff available, skipping AI categorization"
            echo "ai_result=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          AI_JSON=$(echo "$DIFF" | node scripts/ai-categorize-pr.js)
          echo "AI categorization completed successfully"

          DELIM="AICAT_$(date +%s%N)"
          echo "ai_result<<${DELIM}" >> "$GITHUB_OUTPUT"
          echo "$AI_JSON" >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

      - name: AI Generate Release Notes from Diff
        id: ai_notes
        if: steps.metadata.outputs.is_release != 'true'
        continue-on-error: true
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$NVIDIA_API_KEY" ]; then
            echo "NVIDIA_API_KEY not set, skipping AI release notes"
            echo "ai_notes=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} 2>/dev/null || echo "")

          if [ -z "$DIFF" ]; then
            echo "No diff available, skipping AI release notes"
            echo "ai_notes=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          AI_NOTES=$(echo "$DIFF" | node scripts/ai-release-notes-from-diff.js)

          DELIM="AINOTES_$(date +%s%N)"
          echo "ai_notes<<${DELIM}" >> "$GITHUB_OUTPUT"
          echo "$AI_NOTES" >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

      - name: Merge AI + shell metadata
        id: final
        env:
          SHELL_WORK_TYPE: ${{ steps.metadata.outputs.work_type }}
          SHELL_SCOPE: ${{ steps.metadata.outputs.scope }}
          SHELL_DESCRIPTION: ${{ steps.metadata.outputs.description }}
          SHELL_NOTES: ${{ steps.metadata.outputs.release_notes }}
          AI_RESULT: ${{ steps.ai_categorize.outputs.ai_result }}
          AI_NOTES: ${{ steps.ai_notes.outputs.ai_notes }}
          IS_RELEASE: ${{ steps.metadata.outputs.is_release }}
        run: |
          # Default to shell-extracted values
          WORK_TYPE="$SHELL_WORK_TYPE"
          SCOPE="$SHELL_SCOPE"
          DESCRIPTION="$SHELL_DESCRIPTION"
          CUSTOMER_NOTES="$SHELL_NOTES"
          RISK="Low"
          AI_FLAGS=""

          # Override with AI results if available (non-release PRs only)
          if [ "$IS_RELEASE" != "true" ] && [ -n "$AI_RESULT" ]; then
            # Parse AI JSON using node + jq for reliability
            AI_PARSED=$(node -e "
              try {
                const r = JSON.parse(process.env.AI_RESULT);
                const out = {
                  work_type: r.work_type || '',
                  scope: r.scope || '',
                  risk: r.risk || '',
                  summary: (r.summary || '').replace(/\n/g, ' '),
                  flags: Array.isArray(r.flags) ? r.flags.join(', ') : (r.flags || '')
                };
                console.log(JSON.stringify(out));
              } catch(e) { console.log('{}'); }
            ")

            AI_WORK_TYPE=$(echo "$AI_PARSED" | jq -r '.work_type // empty')
            AI_SCOPE=$(echo "$AI_PARSED" | jq -r '.scope // empty')
            AI_RISK=$(echo "$AI_PARSED" | jq -r '.risk // empty')
            AI_SUMMARY=$(echo "$AI_PARSED" | jq -r '.summary // empty')
            AI_FLAGS=$(echo "$AI_PARSED" | jq -r '.flags // empty')

            if [ -n "$AI_WORK_TYPE" ]; then
              WORK_TYPE="$AI_WORK_TYPE"
              echo "Using AI work type: $WORK_TYPE"
            fi
            if [ -n "$AI_SCOPE" ]; then
              SCOPE="$AI_SCOPE"
              echo "Using AI scope: $SCOPE"
            fi
            if [ -n "$AI_RISK" ]; then
              RISK="$AI_RISK"
              echo "Using AI risk: $RISK"
            fi
            if [ -n "$AI_SUMMARY" ]; then
              DESCRIPTION="$AI_SUMMARY"
              echo "Using AI summary: $DESCRIPTION"
            fi
          fi

          # Use AI-generated release notes if available
          if [ -n "$AI_NOTES" ] && [ "$AI_NOTES" != "No release notes available." ]; then
            CUSTOMER_NOTES="$AI_NOTES"
            echo "Using AI-generated release notes"
          fi

          # Sanitize single-line outputs (replace newlines with spaces)
          echo "work_type=$(echo "$WORK_TYPE" | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          echo "scope=$(echo "$SCOPE" | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          echo "risk=$(echo "$RISK" | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          echo "flags=$(echo "$AI_FLAGS" | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

          DELIM="DESC_$(date +%s%N)"
          echo "description<<${DELIM}" >> "$GITHUB_OUTPUT"
          echo "$DESCRIPTION" >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

          DELIM="NOTES_$(date +%s%N)"
          echo "customer_notes<<${DELIM}" >> "$GITHUB_OUTPUT"
          echo "$CUSTOMER_NOTES" >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"

      - name: Extract version
        id: version
        run: |
          VERSION=$(jq -r '.["."]' .release-please-manifest.json 2>/dev/null || echo "")
          echo "version=${VERSION:-N/A}" >> "$GITHUB_OUTPUT"

      - name: Post to Slack
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          WORK_TYPE: ${{ steps.final.outputs.work_type }}
          SCOPE: ${{ steps.final.outputs.scope }}
          DESCRIPTION: ${{ steps.final.outputs.description }}
          JIRA_ID: ${{ steps.metadata.outputs.jira_id }}
          PR_URL: ${{ steps.metadata.outputs.pr_url }}
          PR_NUMBER: ${{ steps.metadata.outputs.pr_number }}
          CUSTOMER_NOTES: ${{ steps.final.outputs.customer_notes }}
          RISK: ${{ steps.final.outputs.risk }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "Warning: SLACK_WEBHOOK_URL not configured, skipping Slack notification"
            exit 0
          fi

          TRUNCATED_NOTES=$(echo "$CUSTOMER_NOTES" | head -c 2500)

          # Add risk emoji
          RISK_EMOJI="🟢"
          case "$RISK" in
            "Medium") RISK_EMOJI="🟡" ;;
            "High") RISK_EMOJI="🟠" ;;
            "Critical") RISK_EMOJI="🔴" ;;
          esac

          PAYLOAD=$(cat <<EOFPAYLOAD
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "Deployed: ${DESCRIPTION}"
                }
              },
              {
                "type": "section",
                "fields": [
                  { "type": "mrkdwn", "text": "*Type:* ${WORK_TYPE}" },
                  { "type": "mrkdwn", "text": "*Scope:* ${SCOPE}" },
                  { "type": "mrkdwn", "text": "*Jira:* ${JIRA_ID}" },
                  { "type": "mrkdwn", "text": "*Risk:* ${RISK_EMOJI} ${RISK}" },
                  { "type": "mrkdwn", "text": "*PR:* <${PR_URL}|#${PR_NUMBER}>" }
                ]
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Release Notes:*\n${TRUNCATED_NOTES}"
                }
              }
            ]
          }
          EOFPAYLOAD
          )

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"

          echo "Slack notification sent for PR #${PR_NUMBER}"

      - name: Create Notion page
        continue-on-error: true
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          WORK_TYPE: ${{ steps.final.outputs.work_type }}
          JIRA_ID: ${{ steps.metadata.outputs.jira_id }}
          DESCRIPTION: ${{ steps.final.outputs.description }}
          PR_URL: ${{ steps.metadata.outputs.pr_url }}
          MERGED_AT: ${{ github.event.pull_request.merged_at }}
          CUSTOMER_NOTES: ${{ steps.final.outputs.customer_notes }}
          VERSION: ${{ steps.version.outputs.version }}
          BREAKING: ${{ steps.metadata.outputs.breaking }}
          RISK: ${{ steps.final.outputs.risk }}
          IS_RELEASE: ${{ steps.metadata.outputs.is_release }}
          CONTRIBUTORS: ${{ steps.metadata.outputs.contributors }}
          PR_CREATED_BY: ${{ steps.metadata.outputs.pr_created_by }}
        run: |
          if [ -z "$NOTION_API_KEY" ] || [ -z "$NOTION_DATABASE_ID" ]; then
            echo "Warning: Notion secrets not configured, skipping Notion update"
            exit 0
          fi

          TRUNCATED_NOTES=$(echo "$CUSTOMER_NOTES" | head -c 1900)

          # Build Features multi-select and Bug Fixes text based on work type
          FEATURES_JSON="[]"
          BUGFIXES_TEXT=""

          # Normalize work type to match expected values
          LOWER_TYPE=$(echo "$WORK_TYPE" | tr '[:upper:]' '[:lower:]')
          case "$LOWER_TYPE" in
            *bug*) WORK_TYPE="Bug Fix" ;;
            *feature*|*story*) WORK_TYPE="Feature" ;;
            *change*|*enhancement*|*improvement*) WORK_TYPE="Change Request" ;;
            *critical*|*hotfix*) WORK_TYPE="Critical Fix" ;;
          esac

          if [ "$IS_RELEASE" = "true" ]; then
            FEATURES_TEXT=$(echo "$CUSTOMER_NOTES" | grep -i 'feature\|new\|add\|enhancement' | head -3 | tr '\n' '; ' || true)
            BUGFIXES_TEXT=$(echo "$CUSTOMER_NOTES" | grep -i 'fix\|bug\|patch\|resolve' | head -3 | tr '\n' '; ' || true)
            if [ -n "$FEATURES_TEXT" ]; then
              FEATURES_JSON='[{"name": "New Feature"}]'
            fi
            NOTION_TITLE="${DESCRIPTION}"
          else
            case "$WORK_TYPE" in
              "Feature")
                FEATURES_JSON='[{"name": "New Feature"}]'
                ;;
              "Change Request")
                FEATURES_JSON='[{"name": "Enhancement"}]'
                ;;
              "Bug Fix")
                BUGFIXES_TEXT="${DESCRIPTION}"
                ;;
              "Critical Fix")
                BUGFIXES_TEXT="${DESCRIPTION}"
                ;;
            esac
            NOTION_TITLE="${JIRA_ID} - ${DESCRIPTION}"
          fi

          PAYLOAD=$(cat <<EOFPAYLOAD
          {
            "parent": { "database_id": "${NOTION_DATABASE_ID}" },
            "properties": {
              "Title": {
                "title": [{ "text": { "content": "${NOTION_TITLE}" } }]
              },
              "Version": {
                "rich_text": [{ "type": "text", "text": { "content": "${VERSION}" } }]
              },
              "Release Date": {
                "date": { "start": "$(echo "$MERGED_AT" | cut -dT -f1)" }
              },
              "Type": {
                "select": { "name": "${WORK_TYPE}" }
              },
              "Status": {
                "status": { "name": "Released" }
              },
              "Summary": {
                "rich_text": [{ "type": "text", "text": { "content": "${TRUNCATED_NOTES}" } }]
              },
              "Features": {
                "multi_select": ${FEATURES_JSON}
              },
              "Bug Fixes": {
                "rich_text": [{ "type": "text", "text": { "content": "${BUGFIXES_TEXT}" } }]
              },
              "Contributors": {
                "rich_text": [{ "type": "text", "text": { "content": "${CONTRIBUTORS:-N/A}" } }]
              },
              "PR Created By": {
                "rich_text": [{ "type": "text", "text": { "content": "${PR_CREATED_BY:-N/A}" } }]
              },
              "Task ID": {
                "rich_text": [{ "type": "text", "text": { "content": "${JIRA_ID}" } }]
              }
            },
            "children": [
              {
                "object": "block",
                "type": "heading_2",
                "heading_2": {
                  "rich_text": [{ "type": "text", "text": { "content": "Release Notes" } }]
                }
              },
              {
                "object": "block",
                "type": "paragraph",
                "paragraph": {
                  "rich_text": [{ "type": "text", "text": { "content": "${TRUNCATED_NOTES}" } }]
                }
              },
              {
                "object": "block",
                "type": "heading_3",
                "heading_3": {
                  "rich_text": [{ "type": "text", "text": { "content": "Links" } }]
                }
              },
              {
                "object": "block",
                "type": "paragraph",
                "paragraph": {
                  "rich_text": [
                    { "type": "text", "text": { "content": "Pull Request: " } },
                    { "type": "text", "text": { "content": "${PR_URL}", "link": { "url": "${PR_URL}" } } }
                  ]
                }
              }
            ]
          }
          EOFPAYLOAD
          )

          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "https://api.notion.com/v1/pages" \
              -H "Authorization: Bearer ${NOTION_API_KEY}" \
              -H "Content-Type: application/json" \
              -H "Notion-Version: 2022-06-28" \
              -d "$PAYLOAD")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)

            if [ "$HTTP_CODE" -eq 200 ]; then
              echo "Notion page created successfully for: ${DESCRIPTION}"
              break
            elif [ "$HTTP_CODE" -eq 429 ]; then
              RETRY_COUNT=$((RETRY_COUNT + 1))
              WAIT_TIME=$((RETRY_COUNT * 2))
              echo "Rate limited. Retrying in ${WAIT_TIME}s (attempt ${RETRY_COUNT}/${MAX_RETRIES})..."
              sleep $WAIT_TIME
            else
              echo "Notion API error (HTTP ${HTTP_CODE})"
              echo "$RESPONSE" | sed '$d'
              break
            fi
          done
