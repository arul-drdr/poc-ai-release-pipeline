name: Release Distribution (Version Milestone)

# This workflow runs when release-please creates a version tag.
# Individual PR notifications are handled by pr-merged-notify.yml.
# This workflow is for aggregated version milestone summaries only.

on:
  release:
    types: [published]

jobs:
  log-release:
    name: Log Version Release
    runs-on: ubuntu-latest
    steps:
      - name: Log release details
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          echo "Version milestone release: ${TAG_NAME}"
          echo "Release URL: ${RELEASE_URL}"
          echo ""
          echo "Individual PR notifications were already sent via pr-merged-notify.yml"
          echo "This workflow can be extended for version-specific actions like:"
          echo "  - Updating version badges"
          echo "  - Triggering deployment pipelines"
          echo "  - Sending version milestone summaries"
