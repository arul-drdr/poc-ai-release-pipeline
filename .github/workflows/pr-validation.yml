name: PR Validation

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

env:
  # Set to 'warn' for soft enforcement (comments only, checks pass)
  # Set to 'enforce' to block merge on validation failures
  ENFORCEMENT_MODE: warn

jobs:
  validate:
    name: Validate PR
    # Skip validation for release-please auto-generated PRs
    if: "!startsWith(github.event.pull_request.title, 'chore(main): release')"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Check PR Title Format
        id: title_check
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|chore|docs|refactor|perf|test|ci|build|critical)\(.+\):.+'
          if [[ ! "$PR_TITLE" =~ $PATTERN ]]; then
            MSG="PR title does not match required format.\n\nExpected: \`type(scope): JIRA-ID description\`\nExample: \`feat(patient): PROJ-1234 Add address validation\`\n\nValid types: feat, fix, chore, docs, refactor, perf, test, ci, build, critical"
            echo "error_msg<<EOF" >> "$GITHUB_OUTPUT"
            echo -e "$MSG" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate PR Body
        id: body_check
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          ERRORS=""

          # Check Work Type - at least one box must be checked
          if ! echo "$PR_BODY" | grep -qE '\- \[x\] (Bug|Feature|Change Request|Critical Fix)'; then
            ERRORS="${ERRORS}- **Work Type**: Please select at least one work type (Bug / Feature / Change Request / Critical Fix)\n"
          fi

          # Check Jira Task ID placeholder
          if echo "$PR_BODY" | grep -q 'PROJ-0000'; then
            ERRORS="${ERRORS}- **Jira Task ID**: Replace \`PROJ-0000\` with your actual Jira task ID\n"
          fi

          # Check Summary placeholder
          if echo "$PR_BODY" | grep -q 'Describe what was changed and why'; then
            ERRORS="${ERRORS}- **Summary of Changes**: Replace the placeholder with an actual description of your changes\n"
          fi

          # Check Release Notes placeholder
          if echo "$PR_BODY" | grep -q 'Write a customer-readable description of this change'; then
            ERRORS="${ERRORS}- **Release Notes**: Write a customer-readable description of this change\n"
          fi

          # Check Acceptance Criteria placeholder
          if echo "$PR_BODY" | grep -q 'Paste or link the acceptance criteria from Jira'; then
            ERRORS="${ERRORS}- **Acceptance Criteria**: Paste or link the acceptance criteria from Jira\n"
          fi

          if [ -n "$ERRORS" ]; then
            echo "error_msg<<EOF" >> "$GITHUB_OUTPUT"
            echo -e "The following PR template fields need to be completed:\n\n${ERRORS}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Jira IDs
        id: jira_id
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Collect Jira IDs from PR title
          TITLE_IDS=$(echo "$PR_TITLE" | grep -oE '[A-Z]+-[0-9]+' || true)

          # Collect Jira IDs from commit messages
          COMMIT_IDS=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json commits --jq '.commits[].messageHeadline' 2>/dev/null \
            | grep -oE '[A-Z]+-[0-9]+' || true)

          # Combine, deduplicate, preserve order (title first)
          ALL_IDS=$(echo -e "${TITLE_IDS}\n${COMMIT_IDS}" | sed '/^$/d' | awk '!seen[$0]++')
          FIRST_ID=$(echo "$ALL_IDS" | head -1)
          ID_COUNT=$(echo "$ALL_IDS" | wc -l | tr -d ' ')
          ID_CSV=$(echo "$ALL_IDS" | paste -sd ',' -)

          if [ -n "$FIRST_ID" ]; then
            echo "jira_id=$FIRST_ID" >> "$GITHUB_OUTPUT"
            echo "all_ids=$ID_CSV" >> "$GITHUB_OUTPUT"
            echo "id_count=$ID_COUNT" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found $ID_COUNT Jira ID(s): $ID_CSV"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Jira ID found in PR title or commits"
          fi

      - name: Fetch Jira Task Data
        id: jira_data
        if: steps.jira_id.outputs.found == 'true'
        continue-on-error: true
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          ALL_IDS: ${{ steps.jira_id.outputs.all_ids }}
        run: |
          if [ -z "$JIRA_BASE_URL" ] || [ -z "$JIRA_USER_EMAIL" ] || [ -z "$JIRA_API_TOKEN" ]; then
            echo "Jira secrets not configured, skipping Jira fetch"
            echo "fetched=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CLEAN_URL=$(echo "$JIRA_BASE_URL" | sed 's|^https\?://||' | sed 's|/$||')
          AUTH=$(echo -n "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" | base64 -w 0)

          # Fetch data for each Jira ID
          TASK_TABLE=""
          ALL_DESCRIPTIONS=""
          FIRST_ISSUE_TYPE=""
          FIRST_SUMMARY=""
          ALL_ASSIGNEES=""
          FETCH_COUNT=0

          IFS=',' read -ra IDS <<< "$ALL_IDS"
          for JIRA_ID in "${IDS[@]}"; do
            echo "Fetching Jira data for $JIRA_ID..."

            RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 10 \
              -H "Authorization: Basic ${AUTH}" \
              -H "Content-Type: application/json" \
              "https://${CLEAN_URL}/rest/api/3/issue/${JIRA_ID}?fields=issuetype,summary,description,status,assignee") || continue

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" = "200" ]; then
              ISSUE_TYPE=$(echo "$BODY" | jq -r '.fields.issuetype.name // "N/A"')
              SUMMARY=$(echo "$BODY" | jq -r '.fields.summary // "N/A"')
              STATUS=$(echo "$BODY" | jq -r '.fields.status.name // "N/A"')
              ASSIGNEE=$(echo "$BODY" | jq -r '.fields.assignee.displayName // "Unassigned"')
              DESCRIPTION=$(echo "$BODY" | jq -r '
                [.fields.description.content[]? |
                  if .type == "paragraph" or .type == "heading" then
                    [.content[]?.text // empty] | join("")
                  elif .type == "bulletList" or .type == "orderedList" then
                    [.content[]?.content[]?.content[]?.text // empty] | map("- " + .) | join("\n")
                  else empty end
                ] | join("\n")' 2>/dev/null || echo "No description")
              DESCRIPTION=$(echo "$DESCRIPTION" | head -20)

              TASK_TABLE="${TASK_TABLE}| [${JIRA_ID}](https://${CLEAN_URL}/browse/${JIRA_ID}) | ${SUMMARY} | ${STATUS} |\n"

              if [ -n "$DESCRIPTION" ] && [ "$DESCRIPTION" != "No description" ]; then
                ALL_DESCRIPTIONS="${ALL_DESCRIPTIONS}### ${JIRA_ID}: ${SUMMARY}\n${DESCRIPTION}\n\n"
              fi

              if [ -z "$FIRST_ISSUE_TYPE" ]; then
                FIRST_ISSUE_TYPE="$ISSUE_TYPE"
                FIRST_SUMMARY="$SUMMARY"
              fi

              if [ "$ASSIGNEE" != "Unassigned" ]; then
                ALL_ASSIGNEES="${ALL_ASSIGNEES}${ASSIGNEE}\n"
              fi

              FETCH_COUNT=$((FETCH_COUNT + 1))
              echo "Fetched $JIRA_ID: $SUMMARY ($STATUS)"
            else
              echo "Jira API returned HTTP $HTTP_CODE for $JIRA_ID"
              TASK_TABLE="${TASK_TABLE}| ${JIRA_ID} | _(fetch failed)_ | - |\n"
            fi
          done

          if [ "$FETCH_COUNT" -gt 0 ]; then
            # Deduplicate assignees
            UNIQUE_ASSIGNEES=$(echo -e "$ALL_ASSIGNEES" | sed '/^$/d' | sort -u | paste -sd ',' - | sed 's/,/, /g')

            echo "fetched=true" >> "$GITHUB_OUTPUT"
            echo "issue_type=$FIRST_ISSUE_TYPE" >> "$GITHUB_OUTPUT"
            echo "summary=$FIRST_SUMMARY" >> "$GITHUB_OUTPUT"
            echo "assignee=${UNIQUE_ASSIGNEES:-Unassigned}" >> "$GITHUB_OUTPUT"
            echo "fetch_count=$FETCH_COUNT" >> "$GITHUB_OUTPUT"

            DELIM="TABLE_$(date +%s%N)"
            echo "task_table<<${DELIM}" >> "$GITHUB_OUTPUT"
            echo -e "$TASK_TABLE" >> "$GITHUB_OUTPUT"
            echo "${DELIM}" >> "$GITHUB_OUTPUT"

            DELIM="DESC_$(date +%s%N)"
            echo "descriptions<<${DELIM}" >> "$GITHUB_OUTPUT"
            echo -e "$ALL_DESCRIPTIONS" >> "$GITHUB_OUTPUT"
            echo "${DELIM}" >> "$GITHUB_OUTPUT"
          else
            echo "fetched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-fill PR body from Jira
        if: steps.jira_data.outputs.fetched == 'true' && (github.event.action == 'opened' || github.event.action == 'reopened')
        uses: actions/github-script@v7
        env:
          JIRA_ID: ${{ steps.jira_id.outputs.jira_id }}
          ALL_IDS: ${{ steps.jira_id.outputs.all_ids }}
          JIRA_ISSUE_TYPE: ${{ steps.jira_data.outputs.issue_type }}
          JIRA_SUMMARY: ${{ steps.jira_data.outputs.summary }}
          JIRA_TASK_TABLE: ${{ steps.jira_data.outputs.task_table }}
          JIRA_DESCRIPTIONS: ${{ steps.jira_data.outputs.descriptions }}
          JIRA_ASSIGNEE: ${{ steps.jira_data.outputs.assignee }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            let body = context.payload.pull_request.body || '';

            // Only auto-fill if the body still has placeholders (not already filled)
            if (!body.includes('PROJ-0000') && !body.includes('Describe what was changed and why')) {
              console.log('PR body already filled in, skipping auto-fill');
              return;
            }

            const jiraId = process.env.JIRA_ID;
            const allIds = process.env.ALL_IDS || jiraId;
            const issueType = process.env.JIRA_ISSUE_TYPE;
            const summary = process.env.JIRA_SUMMARY;
            const taskTable = process.env.JIRA_TASK_TABLE || '';
            const descriptions = process.env.JIRA_DESCRIPTIONS || '';

            // Auto-check Work Type based on Jira issue type
            const type = (issueType || '').toLowerCase();
            if (type.includes('bug')) {
              body = body.replace('- [ ] Bug', '- [x] Bug');
            } else if (type.includes('story') || type.includes('feature') || type.includes('task')) {
              body = body.replace('- [ ] Feature', '- [x] Feature');
            } else if (type.includes('change') || type.includes('improvement')) {
              body = body.replace('- [ ] Change Request', '- [x] Change Request');
            } else if (type.includes('critical') || type.includes('hotfix') || type.includes('incident')) {
              body = body.replace('- [ ] Critical Fix', '- [x] Critical Fix');
            }

            // Replace Jira Tasks table placeholder with fetched task table
            if (taskTable) {
              body = body.replace(
                '| PROJ-0000 | - | - |',
                taskTable.trim()
              );
            }

            // Replace Summary placeholder with first Jira summary
            body = body.replace(
              'Describe what was changed and why',
              summary || 'Describe what was changed and why'
            );

            // Replace Acceptance Criteria placeholder with all task descriptions
            if (descriptions) {
              body = body.replace(
                'Paste or link the acceptance criteria from Jira',
                descriptions.trim()
              );
            }

            // Build contributors list from commit authors + Jira assignee
            const contributors = new Set();

            // Add Jira assignee
            const assignee = process.env.JIRA_ASSIGNEE || '';
            if (assignee && assignee !== 'Unassigned') {
              contributors.add(assignee);
            }

            // Fetch commit authors from PR
            try {
              const commits = await github.rest.pulls.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                per_page: 100
              });
              for (const commit of commits.data) {
                const name = commit.commit.author?.name;
                if (name && !name.includes('[bot]')) {
                  contributors.add(name);
                }
              }
            } catch (e) {
              console.log(`Could not fetch commits: ${e.message}`);
            }

            // Replace Contributors placeholder
            if (contributors.size > 0) {
              body = body.replace(
                'Auto-detected from commits',
                [...contributors].join(', ')
              );
            }

            // Replace PR Created By with GitHub PR author
            const prAuthor = context.payload.pull_request.user.login;
            body = body.replace(
              'Auto-detected from PR',
              `@${prAuthor}`
            );

            // Update the PR body
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              body: body
            });

            console.log(`Auto-filled PR #${prNumber} body from Jira ${jiraId}`);

      - name: Auto-Label PR
        uses: actions/github-script@v7
        env:
          JIRA_FOUND: ${{ steps.jira_id.outputs.found }}
          JIRA_FETCHED: ${{ steps.jira_data.outputs.fetched }}
        with:
          script: |
            const title = context.payload.pull_request.title;
            const labels = [];

            // Type labels
            if (title.startsWith('feat')) labels.push('feature');
            else if (title.startsWith('fix')) labels.push('bug');
            else if (title.startsWith('critical')) labels.push('critical-fix');
            else if (title.startsWith('chore') || title.startsWith('ci') || title.startsWith('build')) labels.push('maintenance');
            else if (title.startsWith('docs')) labels.push('documentation');
            else if (title.startsWith('refactor') || title.startsWith('perf')) labels.push('improvement');

            // Jira verification labels
            const jiraFound = process.env.JIRA_FOUND === 'true';
            const jiraFetched = process.env.JIRA_FETCHED === 'true';

            // Remove existing jira labels first
            const currentLabels = context.payload.pull_request.labels.map(l => l.name);
            for (const old of ['jira-verified', 'jira-unverified', 'jira-missing']) {
              if (currentLabels.includes(old)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name: old
                }).catch(() => {});
              }
            }

            if (!jiraFound) {
              labels.push('jira-missing');
            } else if (jiraFetched) {
              labels.push('jira-verified');
            } else {
              labels.push('jira-unverified');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labels
              });
              console.log(`Added labels: ${labels.join(', ')}`);
            }

      - name: Add Jira Context as PR Comment
        if: steps.jira_data.outputs.fetched == 'true'
        uses: actions/github-script@v7
        env:
          JIRA_TASK_TABLE: ${{ steps.jira_data.outputs.task_table }}
          JIRA_DESCRIPTIONS: ${{ steps.jira_data.outputs.descriptions }}
          ALL_IDS: ${{ steps.jira_id.outputs.all_ids }}
          FETCH_COUNT: ${{ steps.jira_data.outputs.fetch_count }}
        with:
          script: |
            const taskTable = process.env.JIRA_TASK_TABLE || '';
            const descriptions = process.env.JIRA_DESCRIPTIONS || '';
            const allIds = process.env.ALL_IDS || '';
            const fetchCount = process.env.FETCH_COUNT || '0';

            const body = `## Jira Task Context\n\n` +
              `**${fetchCount} task(s) linked:** ${allIds}\n\n` +
              `| Task ID | Summary | Status |\n` +
              `|---------|---------|--------|\n` +
              `${taskTable.trim()}\n\n` +
              (descriptions ? `### Acceptance Criteria\n${descriptions.trim()}\n\n` : '') +
              `---\n*Auto-generated by PR Validation workflow*`;

            // Check if a Jira context comment already exists, update it instead of creating duplicates
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });

            const existing = comments.data.find(c => c.body.includes('## Jira Task Context'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body
              });
            }

      - name: Report Validation Result
        if: steps.title_check.outputs.failed == 'true' || steps.body_check.outputs.failed == 'true'
        uses: actions/github-script@v7
        env:
          ENFORCEMENT_MODE: ${{ env.ENFORCEMENT_MODE }}
          TITLE_FAILED: ${{ steps.title_check.outputs.failed }}
          TITLE_ERROR: ${{ steps.title_check.outputs.error_msg }}
          BODY_FAILED: ${{ steps.body_check.outputs.failed }}
          BODY_ERROR: ${{ steps.body_check.outputs.error_msg }}
        with:
          script: |
            let message = '## PR Validation Issues\n\n';

            if (process.env.TITLE_FAILED === 'true') {
              message += '### Title Format\n' + process.env.TITLE_ERROR + '\n\n';
            }
            if (process.env.BODY_FAILED === 'true') {
              message += '### Missing Fields\n' + process.env.BODY_ERROR + '\n\n';
            }

            const mode = process.env.ENFORCEMENT_MODE;
            if (mode === 'warn') {
              message += '> **Note**: Validation is currently in **warning mode**. These issues will block merge once enforcement is enabled.';
            }

            // Post or update validation comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });

            const existing = comments.data.find(c => c.body.includes('## PR Validation Issues'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: message
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: message
              });
            }

            if (mode === 'enforce') {
              core.setFailed('PR validation failed. Please fix the issues above.');
            } else {
              core.warning('PR validation issues found (warning mode - not blocking).');
            }
